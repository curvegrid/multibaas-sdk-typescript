name: Generate SDK

on:
  workflow_dispatch:
    inputs:
      version:
        description: The SDK version to generate as "X.Y.Z".
        default: "X.Y.Z"
        required: true
        type: string
      openapi-generator-version:
        description: The openapi-generator version to use. '' for the version used during the last generation, 'latest' for latest, 'x.y.z' for version x.y.z.
        default: "latest"
        required: true
        type: string

env:
  # Go / Node / PostgreSQL version to use in the CI
  NODE_VER: "20"

jobs:
  generate:
    name: Generate SDK
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      OPENAPI_GENERATOR_VERSION: "${{ github.event.inputs.openapi-generator-version }}"
    permissions:
      contents: write
    steps:
      - name: Check Tag
        id: check-tag
        run: |
          if ! [[ ${{ github.event.inputs.version }} =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
              echo "::error ::The provided version has incorrect format: it should match '[0-9]+\.[0-9]+\.[0-9]+(-.+)?'" 1>&2
              exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "${{ env.NODE_VER }}"
          registry-url: https://registry.npmjs.org/
      - name: Pull OpenAPI Generator Docker Image
        run: |
          if [[ "${{ github.event.inputs.openapi-generator-version }}" == "latest" || "${{ github.event.inputs.openapi-generator-version }}" == "7.17.0" ]]; then
            echo "📥 Pulling Docker image: openapitools/openapi-generator-cli:latest"
            docker pull openapitools/openapi-generator-cli:latest
          else
            echo "📥 Pulling Docker image: openapitools/openapi-generator-cli:v${{ github.event.inputs.openapi-generator-version }}"
            docker pull openapitools/openapi-generator-cli:v${{ github.event.inputs.openapi-generator-version }}
          fi
      - name: Verify OpenAPI Generator Version
        run: |
          if [[ "${{ github.event.inputs.openapi-generator-version }}" == "latest" || "${{ github.event.inputs.openapi-generator-version }}" == "7.17.0" ]]; then
            DOCKER_TAG="latest"
          else
            DOCKER_TAG="v${{ github.event.inputs.openapi-generator-version }}"
          fi
          echo "🔍 Verifying OpenAPI Generator version in Docker image: openapitools/openapi-generator-cli:${DOCKER_TAG}"
          docker run --rm openapitools/openapi-generator-cli:${DOCKER_TAG} version
      - name: Generate SDK to check for changes (Docker)
        run: ./generate-docker.sh
      - name: Generate SDK to check for changes
        run: ./generate.sh
      - name: Check for changes
        run: |
          if ! git status --porcelain=v1 | grep -v -e openapitools.json -e .openapi-generator/VERSION | tee /dev/stderr | [ $(wc -l) -ne 0 ]; then
            echo "::error ::No changes to the Multibaas APIv0 specifications detected." 1>&2
            exit 1
          fi
      - name: Generate SDK with new package version
        run: ./generate.sh ${{ github.event.inputs.version }}
      - name: Generate SDK with new package version (Docker)
        run: ./generate-docker.sh ${{ github.event.inputs.version }}
      
      - name: Pack SDK for testing locally
        id: build
        run: |
          # Build the package
          npm pack
          # Get the wheel filename for testing
          WHEEL_FILE=$(ls *.tgz | head -n 1)
          echo "wheel_file=$WHEEL_FILE" >> $GITHUB_OUTPUT
      
      - name: Run esm example
        working-directory: example-esm
        env:
          MB_BASE_URL:  ${{ secrets.MB_BASE_URL }}
          MB_API_KEY:   ${{ secrets.MB_API_KEY }}
        run: |
          # Install the built wheel package
          npm install @curvegrid/multibaas-sdk-typescript@file:../${{ steps.build.outputs.wheel_file }}
          # Install example dependencies
          npm install
          # Run the example script
          npm run start
          # Check TypeScript types
          npx tsx --noEmit

      - name: Run commonjs example
        working-directory: example-commonjs
        env:
          MB_BASE_URL:  ${{ secrets.MB_BASE_URL }}
          MB_API_KEY:   ${{ secrets.MB_API_KEY }}
        run: |
          # Install the built wheel package
          npm install @curvegrid/multibaas-sdk-typescript@file:../${{ steps.build.outputs.wheel_file }}
          # Install example dependencies
          npm install
          # Run the example script
          npm run start
          # Check TypeScript types
          npx tsx --noEmit

      - name: Setup Git Configurations
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "<>"
      - name: Push if there are changes
        run: |
          git add .
          git commit -am "Auto-generated SDK v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}" main
          git push origin "v${{ github.event.inputs.version }}"
          git push origin main
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        run: npm publish --access public
